services:
  gateway:
    container_name: sandol-gateway
    build: ./sandol-gateway/gateway
    ports:
      - "8010:80"
    environment:
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      meal-service:
        condition: service_healthy
      kakao-bot-service:
        condition: service_healthy
      static-info-service:
        condition: service_healthy
      classroom-timetable-service:
        condition: service_healthy
      auth-relay:
        condition: service_healthy
    volumes:
      - ./sandol-gateway/gateway:/etc/nginx/conf.d
    command: [ "/usr/local/openresty/bin/openresty", "-g", "env SECRET_KEY; daemon off;" ]
    networks:
      - sandol_network
    restart: always
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  meal-service:
    container_name: sandol_meal_service
    build: ./sandol_meal_service
    env_file:
      - ./sandol_meal_service/.env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./sandol_meal_service:/app
      - ./sandol_meal_service/app/config/student_cafeteria.json:/app/app/config/student_cafeteria.json:ro
      - ./sandol_meal_service/app/config/meal_types.json:/app/app/config/meal_types.json:ro
    networks:
      - sandol_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/meal/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"
    depends_on:
      keycloak:
        condition: service_healthy
      meal-service-db:
        condition: service_healthy

  meal-service-db:
    container_name: meal-service-db
    image: postgres:15
    restart: always
    env_file:
      - ./sandol_meal_service/.env
    volumes:
      - ./sandol_meal_service/db_data:/var/lib/postgresql/data
    networks:
      - sandol_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d meal_service -U postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

  kakao-bot-service:
    container_name: sandol_kakao_bot_service
    build: ./sandol_kakao_bot_service
    environment:
      SECRET_KEY: ${SECRET_KEY}
      PYTHONUNBUFFERED: "1"
      TOKEN_ENCRYPTION_KEY: ${KAKAO_TOKEN_ENCRYPTION_KEY}
    volumes:
      - ./sandol_kakao_bot_service:/app
    networks:
      - sandol_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/kakao-bot/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  static-info-service:
    container_name: sandol_static_info_service
    build: ./sandol-static-info-service
    environment:
      SECRET_KEY: ${SECRET_KEY}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./sandol-static-info-service:/app
      - ./sandol-static-info-service/app/config/school_info.json:/app/app/config/school_info.json:ro
    networks:
      - sandol_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/static-info/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  classroom-timetable-service:
    container_name: sandol_classroom_timetable_service
    build: ./sandol_classroom_timetable_service
    volumes:
      - ./sandol_classroom_timetable_service/data/lecture_array.json:/app/data/lecture_array.json:ro
      - ./sandol_classroom_timetable_service/data/buildings.csv:/app/data/buildings.csv:ro
    networks:
      - sandol_network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider --tries=1 http://localhost:80/classroom-timetable/health || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  notice-notification:
    container_name: sandol-notice-notification
    build:
      context: ./sandol_notice_notification
      dockerfile: Dockerfile
    restart: always

    env_file:
      - ./sandol_notice_notification/.env.dev

    networks:
      - sandol_network

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/notice-notification/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    depends_on:
      amqp:
        condition: service_healthy
      notice-notification-db:
        condition: service_healthy

    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  notice-notification-db:
    container_name: sandol-notice-notification-db
    image: postgres:15
    restart: always
    env_file:
      - ./sandol_notice_notification/.env.dev
    volumes:
      - ./sandol_notice_notification/db_data:/var/lib/postgresql/data
    networks:
      - sandol_network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres -U root" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  amqp:
    container_name: amqp
    image: rabbitmq:3-management
    expose:
      - "15692"
    volumes:
      - ./config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - sandol_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics status && rabbitmq-plugins list -E -m | grep -qx rabbitmq_prometheus && rabbitmq-diagnostics listeners | grep -q 15692"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./sandol-log-manager/config/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - ./sandol-log-manager/data:/var/lib/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sandol_network
    restart: always

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.3.0}
    container_name: prometheus
    volumes:
      - ./config/monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
    ports:
      - "9090:9090"
    networks:
      - sandol_network
    restart: always

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sandol-log-manager/config/alloy/config.alloy:/etc/alloy/config.alloy
      - alloy_data:/var/lib/alloy/data
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - 12345:12345
      - 4317:4317
      - 4318:4318
    depends_on:
      - loki
    networks:
      - sandol_network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./sandol-log-manager/config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - sandol_network
    restart: always
    environment:
      GF_LOG_LEVEL: "warn"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  keycloak-db:
    container_name: keycloak-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - sandol_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d keycloak -U ${KC_DB_USERNAME}"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 20s
    restart: always
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  # --- Keycloak 인증 서버 ---
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.3.2
    command: ["start"]
    environment:
      # --- 관리자 계정 ---
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # --- 호스트 및 경로 설정 ---
      KC_HOSTNAME: ${SERVICE_DOMAIN:-sandori.kr}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "true"
      KC_HEALTH_ENABLED: "true"

      # --- 데이터베이스 연결 ---
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}

      # --- 디버깅용 로그 설정 ---
      KC_LOG_CATEGORY__ORG_FREEMARKER__LEVEL: DEBUG
    networks:
      - sandol_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /auth/health/live HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && head -n 1 <&3 | grep -q 'HTTP/1.1 200'"
        ]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./sandol_user_service/web/keycloak-theme:/opt/keycloak/themes:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"

  # --- Auth Relay 서비스 ---
  auth-relay:
    container_name: auth-relay
    build: ./sandol-auth-relay
    env_file:
      - ./sandol-auth-relay/.env
    volumes:
      - ./sandol-auth-relay/app/config/clients.json:/app/app/config/clients.json:ro
    networks:
      - sandol_network
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/relay/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s



volumes:
  grafana_data: {}
  alloy_data: {}
  # --- 추가: Keycloak DB 볼륨 ---
  keycloak_db_data: {}
  keycloak_data: {}

networks:
  sandol_network:
    driver: bridge
